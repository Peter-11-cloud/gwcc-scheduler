name: Birthday Card Reminder

on:
  schedule:
    - cron: '0 15 * * *'   # 8:00 AM Pacific Time every day
  workflow_dispatch:         # allows manual trigger from GitHub for testing

jobs:
  check-birthdays:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install nodemailer

      - name: Check birthdays and send reminder
        run: node scripts/birthday-check.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
